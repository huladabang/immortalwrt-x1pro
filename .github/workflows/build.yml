name: Build ImmortalWrt for Oray X1Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential gawk unzip file wget python3 python3-pip \
            python3-setuptools python3-yaml rsync curl git libncurses-dev \
            libssl-dev libelf-dev zlib1g-dev time rsync subversion gettext patch perl

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 https://github.com/padavanonly/immortalwrt-mt798x-6.6 source

      - name: Restore caches
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            source/dl
            source/staging_dir
          key: build-cache-${{ hashFiles('feeds.conf.default', '.github/workflows/build.yml') }}
          restore-keys: |
            build-cache-

      - name: Update & install feeds
        working-directory: source
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-openclash
          ./scripts/feeds install -p istore luci-app-store
          ./scripts/feeds install -a

      - name: Apply patches
        working-directory: source
        run: |
          mkdir -p target/linux/mediatek/dts
          cp /home/runner/work/immortalwrt-x1pro/immortalwrt-x1pro/mt7981b-oray-x1pro-v1.dtsi target/linux/mediatek/dts/
          cp /home/runner/work/immortalwrt-x1pro/immortalwrt-x1pro/mt7981b-oray-x1pro-v1.dts target/linux/mediatek/dts/
          cp /home/runner/work/immortalwrt-x1pro/immortalwrt-x1pro/mt7981b-oray-x1pro-v1-ubootmod.dts target/linux/mediatek/dts/
          cp /home/runner/work/immortalwrt-x1pro/immortalwrt-x1pro/filogic.mk target/linux/mediatek/image/
          cp /home/runner/work/immortalwrt-x1pro/immortalwrt-x1pro/feeds.conf.default .

      - name: Configure (ubootmod version)
        working-directory: source
        run: |
          cp defconfig/mt7981-ax3000.config .config
          sed -i "/CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_/d" .config
          sed -i "/CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_/d" .config
          echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=y" >> .config
          echo "CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=" >> .config
          cat >> .config << 'CONFIG_EOF'
CONFIG_PACKAGE_luci-app-openclash=y
CONFIG_PACKAGE_luci-app-store=y
CONFIG_PACKAGE_kmod-usb-storage=y
CONFIG_PACKAGE_kmod-usb-storage-uas=y
CONFIG_PACKAGE_kmod-usb-net=y
CONFIG_PACKAGE_kmod-usb-net-rndis=y
CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
CONFIG_PACKAGE_kmod-usb-net-cdc-subset=y
CONFIG_PACKAGE_kmod-usb-net-cdc-eem=y
CONFIG_PACKAGE_kmod-usb-net-cdc-ncm=y
CONFIG_PACKAGE_kmod-usb-net-huawei-cdc-ncm=y
CONFIG_PACKAGE_kmod-usb-net-ipheth=y
CONFIG_PACKAGE_kmod-usb-net-sierrawireless=y
CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
CONFIG_PACKAGE_kmod-usb-serial=y
CONFIG_PACKAGE_kmod-usb-serial-option=y
CONFIG_PACKAGE_kmod-usb-serial-wwan=y
CONFIG_PACKAGE_kmod-usb-serial-qualcomm=y
CONFIG_PACKAGE_kmod-usb-acm=y
CONFIG_PACKAGE_kmod-usb-printer=y
CONFIG_PACKAGE_kmod-usb-uhci=y
CONFIG_PACKAGE_kmod-usb-ohci=y
CONFIG_PACKAGE_kmod-usb2=y
CONFIG_PACKAGE_kmod-usb3=y
CONFIG_PACKAGE_usbutils=y
CONFIG_PACKAGE_kmod-fs-exfat=y
CONFIG_PACKAGE_kmod-fs-ext4=y
CONFIG_PACKAGE_kmod-fs-ntfs3=y
CONFIG_PACKAGE_kmod-fs-f2fs=y
CONFIG_PACKAGE_e2fsprogs=y
CONFIG_EOF
          make defconfig

      - name: Build firmware
        working-directory: source
        run: |
          make -j$(nproc) V=s

      - name: Save caches
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            source/dl
            source/staging_dir
          key: build-cache-${{ hashFiles('feeds.conf.default', '.github/workflows/build.yml') }}

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-oray-x1pro-ubootmod
          path: source/bin/targets/mediatek/filogic/
          retention-days: 30
